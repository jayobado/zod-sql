name: Publish to JSR

on:
  release:
    types: [published] # Triggered only when you hit "Publish release" in GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write 
    steps:
      - uses: actions/checkout@v4
      - run: npx jsr publish # or 'deno publish'
